<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0B0B0B" />
  <title>NON</title>

  <!-- A-Frame + MindAR (image tracking). Pinned versions for reproducible builds. -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===================== First screen: permission gate ===================== -->
  <!-- Minimal. White logotype on dark, one line of instruction, one tap. -->
  <section id="gate" class="screen">
    <div class="gate-inner">
      <h1 class="logotype" aria-label="NON">
        <!-- Official NON white logotype (trademark). Inlined so CSS controls size. -->
        <svg viewBox="0 0 446.14 142.83" xmlns="http://www.w3.org/2000/svg" role="img" focusable="false">
          <path fill="#fff" d="M311,3.27,382.86,114h.38V3.27h17.22V139.8h-19.9L309.23,30.21h-.38V139.8H291.63V3.27ZM139.11,44.62a67.51,67.51,0,0,1,12.33-22.85A60.24,60.24,0,0,1,171.91,5.9Q184.15,0,200.41,0T228.9,5.93a60.37,60.37,0,0,1,20.47,15.84A67.86,67.86,0,0,1,261.7,44.62a89.92,89.92,0,0,1,0,53.75,67.86,67.86,0,0,1-12.33,22.85A59.31,59.31,0,0,1,228.9,137q-12.24,5.82-28.49,5.83T171.91,137a59.31,59.31,0,0,1-20.47-15.78,67.42,67.42,0,0,1-12.33-22.85,89.92,89.92,0,0,1,0-53.75m16.73,47.24a55.56,55.56,0,0,0,8.41,18.07A43.32,43.32,0,0,0,179,122.84q9,4.88,21.43,4.87t21.42-4.87a43.32,43.32,0,0,0,14.73-12.91A55.61,55.61,0,0,0,245,91.85a78.79,78.79,0,0,0,0-40.73A55.61,55.61,0,0,0,236.56,33a43.19,43.19,0,0,0-14.73-12.9q-9-4.89-21.42-4.88T179,20.14a43.15,43.15,0,0,0-14.73,13,55.42,55.42,0,0,0-8.41,18.06,78.79,78.79,0,0,0,0,40.73M19.87,3.27,91.78,114h.38V3.27h17.23V139.8H89.48L18.15,30.21h-.39V139.8H.55V3.27Z"/>
          <path fill="#fff" d="M419.57,5.36H414V3.47h13.48V5.36h-5.62v15h-2.24Z"/>
          <path fill="#fff" d="M429.34,3.47h3.08l5.31,14.17,5.34-14.17h3.07V20.33H444V6.3h0l-5.27,14h-1.91l-5.27-14h0v14h-2.13Z"/>
        </svg>
      </h1>
      <p id="gate-instruction" class="instruction">
        Point your camera at the label.
      </p>
      <button id="gate-button" class="tap-target" type="button">
        Tap to begin
      </button>
      <p id="gate-error" class="error" hidden></p>
    </div>
  </section>

  <!-- ===================== Hints overlaid on the camera ====================== -->
  <div id="hint-scanning" class="hint" hidden>Looking for the label…</div>
  <div id="hint-lost" class="hint" hidden>Bring the label back into view…</div>

  <!-- ===================== Layer controls (bottom) =========================== -->
  <!-- Built/labelled by app.js once a SKU is known. Large, one-handed. -->
  <nav id="controls" class="controls" hidden aria-label="Experience layers">
    <button class="layer-btn" data-layer="art" type="button">Art</button>
    <button class="layer-btn" data-layer="story" type="button">Story</button>
    <button class="layer-btn" data-layer="pairing" type="button">Pairing</button>
  </nav>

  <!-- SKU name, quietly shown once detected. -->
  <div id="sku-label" class="sku-label" hidden></div>

  <!-- The MindAR <a-scene> is injected here by app.js once we know which
       target file to load (single-target fast path vs combined fallback). -->
  <div id="ar-root"></div>

  <!-- Content model first, then scenes, then app logic. -->
  <script src="config.js"></script>
  <script src="scenes/registry.js"></script>
  <script src="scenes/placeholder.js"></script>
  <script src="scenes/non1.js"></script>
  <!-- Add further per-SKU scene scripts here as they are built. -->
  <script src="app.js"></script>
</body>
</html>
